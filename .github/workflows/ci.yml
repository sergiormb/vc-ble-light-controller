name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          timeout 180 sudo apt-get update
          timeout 240 sudo apt-get install -y --no-install-recommends \
            bluez \
            desktop-file-utils \
            dpkg-dev \
            gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 \
            python3-bleak \
            python3-gi \
            python3-pytest

      - name: Test
        run: |
          python3 -m pytest
          python3 -m compileall -q src tests

      - name: Build Debian package
        run: ./scripts/build-deb.sh

      - name: Validate Debian package
        run: |
          dpkg-deb --info dist/vc-ble-light-controller_0.1.0_all.deb
          dpkg-deb --contents dist/vc-ble-light-controller_0.1.0_all.deb
